<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ホワイトブロッサム</title>
    <link rel="icon" href="images/blossom-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- animated cusor-->
    <img src="images/cursor.gif" id="cursor">

    <!-- health bar -->
    <div class="health-container">
        <h1>ヘルス</h1>
        <div class="health-bar">
            <img src="images/heart.gif" class="heart" alt="heart">
            <img src="images/heart.gif" class="heart" alt="heart">
            <img src="images/heart.gif" class="heart" alt="heart">
        </div>
    </div>

    <!-- mana meter-->
    <div class="mana-container">
        <h1>マナ</h1>
        <img src="images/mana.gif" class="orb" alt="mana orb">
    </div>

    <!-- avatar window -->
    <div class="avatar-container">
        <h1>レイナ</h1>
        <img src="images/avatar.gif" alt="avatar" class="avatar">
    </div>

    <!-- weapons window -->
    <div class="weapons-container">
        <h1>兵器</h1>
        <img src="images/weapons.gif" alt="weapons" class="weapons">
    </div>
    
    
</body>
    <script src="script.js"></script>
</html>
