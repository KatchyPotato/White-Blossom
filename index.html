<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ホワイトブロッサム</title>
    <link rel="icon" href="images/blossom-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- animated cusor-->
    <img src="images/cursor.gif" id="cursor">

    <!-- health bar -->
    <div class="health-container">
        <h1>ヘルス</h1>
        <div class="health-bar">
            <img src="images/heart.gif" class="heart" alt="heart">
            <img src="images/heart.gif" class="heart" alt="heart">
            <img src="images/heart.gif" class="heart" alt="heart">
        </div>
    </div>

    <!-- mana meter-->
    <div class="mana-container">
        <h1>マナ</h1>
        <img src="images/mana.gif" class="orb" alt="mana orb">
    </div>

    <!-- avatar window -->
    <div class="avatar-container">
        <h1>レイナ</h1>
        <img src="images/avatar.gif" alt="avatar" class="avatar">
    </div>

    <!-- gear window -->
    <div class="gear-container">
        <h1>兵器</h1>
        <img src="images/weapons.gif" alt="gear" class="gear">
    </div>
    
    <!-- welcome section -->
    <div class="welcome-container">
        <div class="welcome-text">
            <h1>白い花が待っている</h1>
            <img src="images/down-arrow.gif" alt="down arrow">
        </div>
    </div>

    <!-- weapons section -->
    <div class="weapons-container">
        <h1>兵器</h1>
        
        <h2 class="push-right">ブロードソード</h2>
        <a href="https://www.google.com/search?q=broad+sword" target="_blank">
            <img src="images/broad-sword.png" alt="broad-sword" class="push-right hover">
        </a>
        
        <h2 class="push-left">バトルハンマー</h2>
        <a href="https://www.google.com/search?q=battle+hammer" target="_blank">
            <img src="images/hammer.png" alt="battle hammer" class="push-left hover">
        </a>
        
        <h2 class="push-right">シングルアックス</h2>
        <a href="https://www.google.com/search?q=single+axe" target="_blank">
            <img src="images/single-axe.png" alt="single axe" class="push-right hover">
        </a>
        
        <h2 class="push-left">シクルズ</h2>
        <a href="https://www.google.com/search?q=sickles" target="_blank">
            <img src="images/sickles.png" alt="sickles" class="push-left hover">
        </a>

        <h2 class="push-right">ダブルアックス</h2>
        <a href="https://www.google.com/search?q=double+axe" target="_blank">
            <img src="images/double-axe.png" alt="double-axe" class="push-right hover">
        </a>
        
        <h2 class="push-left">レイピア</h2>
        <a href="https://www.google.com/search?q=rapier" target="_blank">
            <img src="images/rapier-sword.png" alt="rapier" class="push-left hover">
        </a>
       
        <h2 class="push-right">槍</h2>
        <a href="https://www.google.com/search?q=spear" target="_blank">
            <img src="images/spear.png" alt="spear" class="push-right hover">
        </a>
        
        <h2 class="push-left">サイス</h2>
        <a href="https://www.google.com/search?q=scythe" target="_blank">
            <img src="images/scythe.png" alt="scythe" class="push-left hover">
        </a>
        
        <h2 class="push-right">苦無</h2>
        <a href="https://www.google.com/search?q=kunai" target="_blank">
            <img src="images/daggers.png" alt="kunai" class="push-right hover">
        </a>
        
        <h2 class="push-left">手裏剣</h2>
        <a href="https://www.google.com/search?q=shurkens" target="_blank">
            <img src="images/shurkens.png" alt="shurkens" class="push-left hover">
        </a>

    </div>
    
    
</body>
    <script src="script.js"></script>
</html>
